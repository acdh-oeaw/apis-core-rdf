{% for field in autocomplete_entity_form %}
    <div class="fieldWrapper">
        {{ field.errors }}
        {% if not field.field.widget.is_hidden %}
            {{ field.label_tag }}
        {% endif %}
        {{ field }}
    </div>
{% endfor %}

<script>
    console.log("property_autocomplete_form_field.html");
    console.log(this);
    console.log(this.parentElement);
    $("#{{ id_single_field_id }}").select2({
        ajax: {
            url: '{{ autocomplete_url }}',
            dataType: 'json'
        }
    })
</script>
