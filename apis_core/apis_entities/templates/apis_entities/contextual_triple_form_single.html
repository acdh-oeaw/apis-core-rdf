<div class="contextual_triple_form" data-entity_type_self="{{ entity_type_self_str }}" data-entity_type_other="{{ entity_type_other_str }}" data-entity_id_self="{{ entity_id_self }}" data-entity_id_other="{{ entity_id_other }}">
    {% for field in contextual_triple_form %}
        <div class="fieldWrapper">
            {{ field.errors }}
            {% if not field.field.widget.is_hidden %}
                {{ field.label_tag }}
            {% endif %}
            {{ field }}
        </div>
    {% endfor %}
    <input onclick="this.parentElement.remove()" type="submit" class="btn btn-primary" value="-" />
    <script>
        search_and_activate_dal_s2(document.currentScript.parentElement);
    </script>
</div>
