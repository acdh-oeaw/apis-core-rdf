<div id="ajax_property_autocmplete_form_field_id">
    {% for field in form_property_autocomplete_field %}
    <div class="fieldWrapper">
        {{ field.errors }}
        {% if not field.field.widget.is_hidden %}
            {{ field.label_tag }}
        {% endif %}
        {{ field }}
    </div>
    {% endfor %}
</div>

<script>
    $("#{{ id_form_field }}").select2({
        ajax: {
            url: '{{ autocomplete_url }}',
            dataType: 'json'
        }
    })
</script>
