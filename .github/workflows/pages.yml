name: "Build documentation"

on:
  push:
    branches: main
    paths-ignore:
      - '.github/**'
  workflow_dispatch:

env:
  DJANGO_SETTINGS_MODULE: sample_project.settings

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
     - uses: actions/checkout@v7
     - name: Install uv
       uses: astral-sh/setup-uv@v7
     - name: Build docs
       run: uv run --group docs mkdocs build -f docs/mkdocs.yml -d _build
     - name: Build coverage
       run: |
         uv run --group docs coverage run
         uv run --group docs coverage html
         mv htmlcov docs/_build/
     - name: Upload static files as artifact
       id: deployment
       uses: actions/upload-pages-artifact@v5 # or specific "vX.X.X" version tag for this action
       with:
         path: docs/_build/

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
